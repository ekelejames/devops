---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fraud-prvt-posdevice-location-ingress
  namespace: dev-anq
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

spec:
  ingressClassName: tcp-nginx
  tls:
  - hosts:
    - devanqapi.coure-tech.com
    secretName: coure-secret
  rules:
  - host: devanqapi.coure-tech.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fraud-prvt-posdevice-location-service
            port:
              number: 8080
